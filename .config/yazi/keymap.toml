[mgr]
append_keymap = [
	{ on = [ "g", "s" ], run = "cd ~/Sec",          desc = "Go to ~/Sec" },
	{ on = [ "g", "p" ], run = "cd ~/Sec/pentest",          desc = "Go to ~/Sec/pentest" },
	{ on = [ "g", "m" ], run = "cd /run/media/onez3r0/FP80",          desc = "Go to /run/media/onez3r0/FP80" },
	{ on = [ "g", "w" ], run = "cd /mnt/windows_d",          desc = "Go to /mnt/windows_d" },
	{ on = [ "g", "t" ], run = "cd /tmp",          desc = "Go to /tmp" },
	{ on = [ "g", "b" ], run = "cd ~/Documents/MyHexoBlog",          desc = "Go to MyBlog" },
]

[[mgr.prepend_keymap]]
on   = [ "c", "a", "a" ]
run  = "plugin compress"
desc = "Archive selected files"

[[mgr.prepend_keymap]]
on   = [ "c", "a", "p" ]
run  = "plugin compress -p"
desc = "Archive selected files (password)"

[[mgr.prepend_keymap]]
on   = [ "c", "a", "h" ]
run  = "plugin compress -ph"
desc = "Archive selected files (password+header)"

[[mgr.prepend_keymap]]
on   = [ "c", "a", "l" ]
run  = "plugin compress -l"
desc = "Archive selected files (compression level)"

[[mgr.prepend_keymap]]
on   = [ "c", "a", "u" ]
run  = "plugin compress -phl"
desc = "Archive selected files (password+header+level)"
